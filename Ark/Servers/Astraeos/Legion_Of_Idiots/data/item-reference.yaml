# ===========================================================================
# item-reference.yaml - page config and manual overrides for the item reference.
#
# Item rows are generated from:
#   - assets/items/ASA_LegionOfIdiots_Item_Manifest.csv
#   - assets/items/ASA_LegionOfIdiots_Item_Manifest_With_Icons.csv
#   - data/item-wiki-cache.json
#
# Keep bulk item data in the generated CSV/cache files. Add hand-curated fixes
# under manualOverrides, keyed by className whenever possible.
# ===========================================================================

page:
  title: Item Reference
  intro: Quick lookup for server items, sources, crafting context, and spawn codes.
  defaultIcon: assets/category-icons/equipment-items.svg
  unknownCraftingStationLabel: Not listed
  unavailableDescriptionLabel: Description unavailable
  maxSourceFilterButtons: 18

sourceLabels:
  base-game: Ark
  map: Ark
  server-config: Ark

categories:
  - id: ammo
    label: Ammo
    color: "#ff6b6b"
