manualOverrides:
  # Ammo override template
  PrimalItemAmmo_AdvancedBullet_C:
    displayName: Advanced Bullet
    category: Ammo
    description: Small-caliber modern ammo primarily used by fabricated pistols.
    craftingStation: Fabricator; Tek Replicator; Exo-Mek
    notes: Used by the Fabricated Pistol.
    wikiUrl: https://ark.wiki.gg/wiki/Advanced_Bullet
  # Armor override template
  PrimalItemArmor_MetalBoots_C:
    displayName: Flak Boots
    category: Armor
    description: Durable metal armor for the survivor's feet.
    craftingStation: Smithy; Argentavis Saddle; Castoroides Saddle; Thorny Dragon Saddle; Tek Replicator
    notes: Standard mid-tier armor piece.
    wikiUrl: https://ark.wiki.gg/wiki/Flak_Boots
  # Artifact override template
  PrimalItemArtifact_Extinction_ForestKaiju_C:
    displayName: Artifact of Growth
    category: Artifact
    description: Artifact used for boss and tribute progression.
    craftingStation: Not listed
    wikiUrl: "https://ark.wiki.gg/wiki/Artifact_of_Growth"
  # Consumable override template
  PrimalItemConsumable_Berry_Amarberry_C:
    displayName: Amarberry
    category: Consumable
    description: Yellow berry eaten by survivors and many herbivores.
    craftingStation: Not listed
    notes: Also used as a basic cooking and taming ingredient.
    wikiUrl: https://ark.wiki.gg/wiki/Amarberry
  # Cosmetic override template
  PrimalItem_Harp_Disks_C:
    displayName: Harp Disks
    category: Cosmetic
    sourceLabel: Castle Craft Decor
    description: Decorative harp music disk from Castle Craft Decor.
    craftingStation: Not listed
    notes: Mod item override example without an ARK wiki URL.
  # Resource override template
  PrimalItemResource_MetalIngot_C:
    displayName: Metal Ingot
    category: Resource
    description: Refined metal used in advanced tools, weapons, armor, and structures.
    craftingStation: Refining Forge; Industrial Forge; Magmasaur
    notes: Also accepts Scrap Metal Ingot in many recipes.
    wikiUrl: https://ark.wiki.gg/wiki/Metal_Ingot
  # Saddle override template
  PrimalItemArmor_AcroSaddle_C:
    displayName: Acro Saddle
    category: Saddle
    description: Saddle used to ride an Acrocanthosaurus.
    craftingStation: Smithy
    notes: Verify mod and map availability if this changes.
    wikiUrl: https://ark.wiki.gg/wiki/Acro_Saddle
  # Skin override template
  PrimalItemSkin_AberrationHelmet_C:
    displayName: Aberrant Helmet Skin
    category: Skin
    description: Cosmetic helmet skin with Aberration styling.
    craftingStation: Not listed
    notes: Skin overrides are useful for event or unlock context.
    wikiUrl: https://ark.wiki.gg/wiki/Aberrant_Helmet_Skin
  # Structure override template
  PrimalItemStructure_AdobeCeiling_C:
    displayName: Adobe Ceiling
    category: Structure
    description: Adobe building ceiling piece for heat-resistant structures.
    craftingStation: Inventory; Smithy
    notes: Use structure notes for snap, tier, or server placement caveats.
    wikiUrl: https://ark.wiki.gg/wiki/Adobe_Ceiling
  # Tool override template
  PrimalItem_WeaponGPS_C:
    displayName: GPS
    category: Tool
    description: Navigation tool that displays current map coordinates.
    craftingStation: Fabricator; Tek Replicator
    notes: Useful for sharing exact base, cave, and tame locations.
    wikiUrl: https://ark.wiki.gg/wiki/GPS
  # Trophy override template
  PrimalItemTrophy_AlphaWorm_C:
    displayName: Alpha Deathworm Trophy
    category: Trophy
    description: Trophy harvested from an Alpha Deathworm.
    craftingStation: Not listed
    notes: Trophy entries are good places for tribute or display context.
    wikiUrl: https://ark.wiki.gg/wiki/Alpha_Deathworm_Trophy
  # Utility override template
  PrimalItem_TreasureMap_ShoulderDragon_C:
    displayName: Dragon Hoard Key
    category: Utility
    description: Utility key item tied to dragon hoard treasure content.
    craftingStation: Not listed
    notes: Use utility notes for event, quest, or server-specific usage.
    wikiUrl: https://ark.wiki.gg/wiki/Dragon_Hoard_Key
  # Weapon override template
  PrimalItem_WeaponOneShotRifle_C:
    displayName: Longneck Rifle
    category: Weapon
    description: Single-shot rifle used for ranged combat and tranquilizer darts.
    craftingStation: Smithy; Argentavis Saddle; Castoroides Saddle; Thorny Dragon Saddle; Tek Replicator
    notes: Supports Simple Rifle Ammo and several dart types.
    wikiUrl: https://ark.wiki.gg/wiki/Longneck_Rifle
  # Unknown category override template
  PrimalItemCanoe_C:
    displayName: Canoe
    category: Unknown
    description: Small paddle boat for low-tech river and shoreline travel.
    craftingStation: Inventory
    notes: Keep Unknown only when a better category has not been verified.
